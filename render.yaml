services:
  - type: static
    name: readeasy-web
    buildCommand: npm install -g pnpm@10.33.2 && pnpm install --ignore-scripts && pnpm --filter @workspace/readeasy run build
    staticPublishPath: artifacts/readeasy/dist/public
    envVars:
      - key: API_PROXY_TARGET
        value: https://readeasy-75d2.onrender.com