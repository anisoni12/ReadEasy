kind = "web"
previewPath = "/"
title = "ReadEasy"
version = "1.0.0"
id = "artifacts/readeasy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22239

[services.development]
run = "pnpm --filter @workspace/readeasy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/readeasy", "run", "build" ]
publicDir = "artifacts/readeasy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22239"
BASE_PATH = "/"
